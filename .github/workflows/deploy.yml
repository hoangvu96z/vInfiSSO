name: Deploy vInfiSSO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy → sso.vunph.click
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js setup ────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install & Build ───────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: Build NestJS
        run: npm run build
        env:
          NODE_ENV: production

      # ── 4. Upload dist lên server qua rsync/SSH ──────────────────────────────
      - name: Upload to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/ package.json package-lock.json
          remote_path: /var/www/sso.vunph.click
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      # ── 5. Install prod deps + tạo .env + restart PM2 ────────────────────────
      - name: Deploy & Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/sso.vunph.click

            echo "📦 Cài production dependencies..."
            npm install --omit=dev

            echo "📝 Tạo .env production..."
            cat > .env << EOF
            DATABASE_HOST=localhost
            DATABASE_PORT=5432
            DATABASE_USER=vinfi_sso
            DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }}
            DATABASE_NAME=vinfi_sso
            NODE_ENV=production
            PORT=3000
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=7d
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=https://sso.vunph.click/sso/oauth/google/callback
            FACEBOOK_APP_ID=${{ secrets.FACEBOOK_APP_ID }}
            FACEBOOK_APP_SECRET=${{ secrets.FACEBOOK_APP_SECRET }}
            FACEBOOK_CALLBACK_URL=https://sso.vunph.click/sso/oauth/facebook/callback
            SSO_BASE_URL=https://sso.vunph.click
            ICHINGNOW_URL=https://vunph.click/kinhdich
            TAROTNOW_URL=https://vunph.click/tarot
            ALLOWED_ORIGINS=https://vunph.click,https://www.vunph.click
            EOF

            echo "🔄 Restart PM2..."
            if pm2 describe vinfi-sso > /dev/null 2>&1; then
              pm2 restart vinfi-sso --update-env
            else
              pm2 start dist/main.js --name vinfi-sso --env production --max-memory-restart 300M
              pm2 save
            fi

            echo "✅ Deploy xong!"
            pm2 show vinfi-sso | grep -E "status|pid|uptime"

      # ── 6. Health check ──────────────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sso.vunph.click/sso/me || echo "000")
          echo "Health: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ OK" || (echo "❌ Failed" && exit 1)
